name: Build Chatty EXE

on:
  push:
    tags:
      - 'v*' # Se declanșează doar la tag-uri de versiune (ex: v1.1.4)

jobs:
  build:
    runs-on: windows-latest
    
    # Adăugăm permisiuni explicite la nivel de job pentru siguranță
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Accelerează build-urile viitoare

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        # Explicație flag-uri:
        # --hidden-import: Forțează includerea modulelor pynput pe care PyInstaller nu le vede automat.
        # --collect-all: Asigură că toate metadatele bibliotecii pynput sunt împachetate.
        run: |
          pyinstaller --onefile --noconsole --name "Chatty" --icon="icon.ico" --hidden-import pynput.keyboard._win32 --hidden-import pynput.mouse._win32 --collect-all pynput chatty.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Chatty.exe
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}